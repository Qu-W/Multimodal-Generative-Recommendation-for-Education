embedding_size: 64
feat_embed_dim: 64

n_ui_layers: 2
n_mm_layers: 1

# Cascade stage switch epochs
stage2_epoch: 30           # mono-modal diagonal W_u
stage3_epoch: 100          # full W_u with cross-modal gate

# Loss weights
reg_weight: [0.0, 1e-4, 1e-3]
sym_weight: [1e-3, 1e-2]   # symmetry regularization on W_shared
cl_weight: [0.1, 0.5]
cf_weight: [0.5, 1.0]

dropout: [0.1, 0.3]
tau: 0.2

hyper_parameters: ["dropout", "reg_weight", "sym_weight", "cl_weight", "cf_weight"]
